          2. Для каждой точки определяет режим (создание/обновление), выравнивает очереди,
             рабочие профили и параметры печати.
          3. При restoreUser возвращает сотрудников на обновлённые точки, при restoreVisit
             восстанавливает визиты и их связь с рабочими местами.
          4. Сохраняет конфигурацию в BranchService и запускает синхронизацию состояния для
             VisitService и клиентского интерфейса.
      operationId: addOrUpdateServicePoints
