      summary: Все услуги отделения
      description: |
        Формирует полный каталог услуг отделения для справочных и интеграционных сценариев:
          1. Загружает отделение с актуальными точками обслуживания и активными сотрудниками.
          2. Извлекает рабочие профили задействованных сотрудников и связанные с ними очереди.
          3. Пересчитывает признак доступности каждой услуги на основании связанной очереди, не изменяя
             остальные атрибуты.
