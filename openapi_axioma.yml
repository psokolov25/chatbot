      summary: Возвращение визита в пул сотрудника
      description: |
        Возвращает визит из точки обслуживания в персональный пул сотрудника:
          1. Валидирует отделение, точку обслуживания и сотрудника, восстанавливающего свой пул ожидания.
          2. Извлекает активный визит с рабочего места и убеждается, что он готов к возврату в пул сотрудника.
          3. Снимает визит с точки обслуживания, устанавливает задержку повторного вызова и очищает привязки к рабочему месту.
             Визит становится доступен для вызова после завершения задержки (elapsedSeconds >= delaySeconds).
          4. Добавляет визит в персональный пул оператора, публикуя событие о возврате для клиентских интерфейсов.
        Возвращает визит в статусе ожидания в персональном пуле сотрудника.

        ⚠️ Эндпоинт сохранён для обратной совместимости и будет заменён унифицированным маршрутизатором визитов.
