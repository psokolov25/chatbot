  /configuration/branches/compare-last-publication:
    post:
      tags:
      - 0.10 · REST · Каноничные точки
      - 1.00 · Контроллеры · Все контроллеры
      - 1.01 · Контроллеры · Конфигурация отделения
      - 1.01.1 · Контроллеры · Конфигурация отделения · Каноничные точки
      - 2.01 · Конфигурация · Отделения
      summary: Сравнить отделения с предыдущей публикацией
      description: |
        Сравнивает входящую конфигурацию отделений с последней успешной публикацией:
          1. Принимает карту отделений, подготовленную к публикации.
          2. Выполняет снимок структуры отделения в том же формате, что и при публикации.
          3. Для каждого branchId вычисляет признак идентичности инфраструктуры и правил.
          4. Возвращает карту branchId -> boolean, где true означает полное совпадение
             с последней публикацией.
      operationId: compareBranchesWithLastPublication
      requestBody:
        description: Карта отделений branchId -> Branch для сравнения с последней
          публикацией.
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/Branch"
            examples:
              singleBranch:
                summary: Сравнение одного отделения
                value:
                  branch-1:
                    id: branch-1
                    name: Основное отделение
        required: true
      responses:
        "200":
          description: Сравнение выполнено
          content:
            application/json:
              schema:
                type: object
        "500":
          description: Ошибка сервера
          content:
            application/json:
              schema:
