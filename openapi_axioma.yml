      - 9.02.7 · Сценарии · Переводы визитов
      summary: Перевод визита внешней службой
      description: |
        Позволяет внешнему сервису перенести визит в другую очередь отделения:
          1. Проверяет, что отделение и целевая очередь существуют и доступны внешней службе.
          2. Получает визит по идентификатору и подтверждает его актуальное состояние через VisitService.
          3. Передаёт данные внешней службы, признак вставки (isAppend=true — в конец, isAppend=false — в начало)
             и задержку, чтобы зафиксировать источник операции.
          4. Возвращает визит уже в новой очереди с обновлёнными атрибутами ожидания и логами происхождения.

        ⚠️ Эндпоинт сохранён для обратной совместимости и будет заменён унифицированным маршрутизатором визитов.
