    ициями."
- name: 3.12.1 · Визиты · Очереди · Каноничные точки
  description: "Каноничные точки управления очередями визитов, рекомендуемые для н\
    овых интеграций."
- name: 3.12.2 · Визиты · Очереди · Legacy точки
  description: "Legacy-точки управления очередями визитов, сохранённые для обратно\
    й совместимости."
- name: 3.13 · Визиты · Пулы
  description: "Операции с пулами визитов сотрудников и точек обслуживания: распре\
    деление и переназначение мест ожидания."
- name: 3.13.1 · Визиты · Пулы · Каноничные точки
  description: "Каноничные точки управления пулами визитов, рекомендуемые для новы\
    х интеграций."
- name: 3.13.2 · Визиты · Пулы · Legacy точки
  description: "Legacy-точки управления пулами визитов, сохранённые для обратной с\
    овместимости."
- name: 3.14 · Визиты · Завершение обслуживания
  description: Завершение обслуживания визита и фиксация итоговых состояний.
- name: 3.15 · Визиты · Возврат к обслуживанию
  description: Возврат визитов к обслуживанию и восстановление их контекстов после
