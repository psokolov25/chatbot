      summary: Создание виртуального визита
      description: |
        Пошагово оформляет виртуальный визит без печати талона:
          1. Загружает конфигурацию отделения и подтверждает наличие филиала; при отсутствии
             данных возвращает бизнес-исключение branch_not_found.
          2. Проверяет, что каждая запрошенная услуга присутствует в каталоге отделения;
             при несоответствии возвращает ошибку services_not_found.
          3. Формирует VisitParameters с упорядоченным списком услуг и пустой картой
             пользовательских атрибутов.
          4. Делегирует создание визита сервису VisitService, передавая идентификаторы
             отделения, точки обслуживания и sid сотрудника для дальнейшей проверки авторизации.
          5. Возвращает карточку визита с идентификатором, статусом ожидания и ссылками на
             очередь для отображения в интерфейсе регистрации.
      operationId: createVirtualVisit
      parameters:
      - name: branchId
        in: path
        description: Идентификатор отделения.
        required: true
        schema:
          type: string
          default: 37493d1c-8282-4417-a729-dceac1f3e2b4
        example: 37493d1c-8282-4417-a729-dceac1f3e2b4
      - name: servicePointId
        in: path
        description: Идентификатор точки обслуживания.
        required: true
        schema:
          type: string
          default: a66ff6f4-4f4a-4009-8602-0dc278024cf2
        example: a66ff6f4-4f4a-4009-8602-0dc278024cf2
      - name: sid
        in: cookie
        description: Идентификатор сущности.
        schema:
          type: string
          nullable: true
        example: b2a2f0f9-1193-4a1b-8d7a-2c2b6b2c2a2f
      requestBody:
        description: Список идентификаторов услуг
        content:
          application/json:
            schema:
              type: array
              example:
              - c3916e7f-7bea-4490-b9d1-0d4064adbe8b
              - 9a6cc8cf-c7c4-4cfd-90fc-d5d525a92a66
              items:
                type: string
        required: true
