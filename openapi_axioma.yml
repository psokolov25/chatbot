        transferTimeDelay:
          type: integer
          description: Лимит ожидания после перевода (сек).
          format: int64
          example: 300
      description: "Визит клиента. Содержит идентификаторы отделения, состояние, о\
        чередь, услуги и временные метки жизненного цикла, которые используются в\
        \ REST API для управления обслуживанием."
      example:
        id: b2a2f0f9-1193-4a1b-8d7a-2c2b6b2c2a2f
        status: WAITING
        ticket: F001
        branchId: 37493d1c-8282-4417-a729-dceac1f3e2b4
        servicePointId: a66ff6f4-4f4a-4009-8602-0dc278024cf2
        queueId: 55da9b66-c928-4d47-9811-dbbab20d3780
        createDateTime: 2024-01-01T09:30:00Z
    VisitEvent:
      type: string
      description: Событие жизненного цикла визита.
      example: CREATED
      x-enum-descriptions:
      - Визит создан.
      - Визит после создания помещён в очередь ожидания.
      - Клиент вызван к рабочему месту.
      - Клиент повторно вызван для продолжения обслуживания.
      - Начато обслуживание по текущей услуге.
      - Завершено обслуживание по текущей услуге.
      - Визит закрыт как \<\<не явился\>\>.
      - Визит завершён по инициативе сотрудника или системы.
      - Визит переведён в пул конкретного сотрудника.
      - Визит переведён в пул точки обслуживания.
      - Визит переведён в очередь ожидания.
      - Визит возвращён в пул сотрудника.
      - Визит возвращён в очередь ожидания.
      - Визит возвращён в пул точки обслуживания.
      - В визит добавлена плановая услуга.
      - В визит добавлена фактически оказанная услуга.
      - Из визита удалена фактически оказанная услуга.
      - Для фактической услуги зафиксирован итог.
      - Для плановой услуги зафиксирован итог.
      - К визиту добавлена марка.
      - К визиту добавлена заметка.
      - К визиту добавлена заметка из приемной.
      - Из визита удалена марка.
      - Из визита удалён итог фактической услуги.
      - Из визита удалён итог плановой услуги.
      - Завершена текущая транзакция обслуживания.
      - Визит удалён сотрудником или системой.
      - Визит завершен после обслуживания
      enum:
      - CREATED
      - PLACED_IN_QUEUE
      - CALLED
      - RECALLED
      - START_SERVING
      - STOP_SERVING
      - NO_SHOW
      - END
      - TRANSFER_TO_USER_POOL
      - TRANSFER_TO_SERVICE_POINT_POOL
      - TRANSFER_TO_QUEUE
      - BACK_TO_USER_POOL
      - BACK_TO_QUEUE
      - BACK_TO_SERVICE_POINT_POOL
      - ADD_SERVICE
      - ADDED_DELIVERED_SERVICE
      - DELETED_DELIVERED_SERVICE
      - ADDED_DELIVERED_SERVICE_RESULT
      - ADDED_SERVICE_RESULT
      - ADDED_MARK
      - ADDED_NOTE
      - ADDED_NOTE_FROM_RECEPTION
      - DELETED_MARK
      - DELETED_DELIVERED_SERVICE_RESULT
      - DELETED_SERVICE_RESULT
      - VISIT_END_TRANSACTION
      - DELETED
      - WRAPPED_UP
    VisitEventInformation:
      type: object
      properties:
        visitEvent:
          description: Тип произошедшего события визита.
          example: CALLED
          allOf:
          - $ref: "#/components/schemas/VisitEvent"
        eventDateTime:
          type: string
          description: Дата и время события.
          format: date-time
          example: 2024-01-01T10:00:00Z
        parameters:
          type: object
          additionalProperties:
            type: string
          description: Дополнительные параметры события.
          example:
            serviceId: c3916e7f-7bea-4490-b9d1-0d4064adbe8b
        transactionCompletionStatus:
          description: "Статус завершения транзакции, если событие его задаёт."
          example: TRANSFER_TO_QUEUE
          allOf:
          - $ref: "#/components/schemas/TransactionCompletionStatus"
      description: "Детализированная запись о событии визита с временем, параметра\
        ми и статусом завершения транзакции."
      example:
        visitEvent: CALLED
        eventDateTime: 2024-01-01T10:00:00Z
        parameters:
          serviceId: c3916e7f-7bea-4490-b9d1-0d4064adbe8b
        transactionCompletionStatus: TRANSFER_TO_QUEUE
    VisitParameters:
      required:
      - serviceIds
      type: object
      properties:
        serviceIds:
          maxItems: 100
          type: array
          description: Список идентификаторов услуг.
          example:
          - c3916e7f-7bea-4490-b9d1-0d4064adbe8b
          items:
            type: string
        parameters:
          maxProperties: 50
          type: object
          additionalProperties:
            type: string
          description: Дополнительные параметры визита.
          example:
            priority: vip
      description: "Набор параметров визита: список услуг и дополнительные атрибут\
        ы сегментации/маршрутизации."
      example:
        serviceIds:
        - c3916e7f-7bea-4490-b9d1-0d4064adbe8b
        parameters:
          priority: vip
          note: ""
    VisitTransferRouteRequest:
      type: object
      properties:
        serviceInfo:
          type: object
          additionalProperties:
            type: string
          description: Дополнительная информация об услуге.
          nullable: true
          example:
            serviceId: c3916e7f-7bea-4490-b9d1-0d4064adbe8b
        sourceId:
          type: string
          description: Идентификатор источника перевода.
          example: 55da9b66-c928-4d47-9811-dbbab20d3780
        targetId:
          type: string
          description: Идентификатор целевой очереди/пула.
          example: c211ae6b-de7b-4350-8a4c-cff7ff98104e
        visitId:
          type: string
          description: Идентификатор визита.
          example: b2a2f0f9-1193-4a1b-8d7a-2c2b6b2c2a2f
        servicePointId:
          type: string
          description: Идентификатор точки обслуживания.
          nullable: true
          example: a66ff6f4-4f4a-4009-8602-0dc278024cf2
        isAppend:
          type: boolean
          description: Добавить визит в конец очереди.
          nullable: true
          example: true
        index:
          type: integer
          description: Индекс позиции в очереди.
          format: int32
          nullable: true
          example: 0
        transferTimeDelay:
          type: integer
          description: Лимит ожидания после перевода (сек).
          format: int64
          nullable: true
          example: 300
      description: "Запрос на перевод визита: источник, цель, идентификатор визита\
        \ и дополнительные параметры."
      example:
        sourceId: 55da9b66-c928-4d47-9811-dbbab20d3780
        targetId: c211ae6b-de7b-4350-8a4c-cff7ff98104e
        visitId: b2a2f0f9-1193-4a1b-8d7a-2c2b6b2c2a2f
        servicePointId: a66ff6f4-4f4a-4009-8602-0dc278024cf2
        isAppend: true
        index: 0
        transferTimeDelay: 300
        serviceInfo:
          serviceId: c3916e7f-7bea-4490-b9d1-0d4064adbe8b
    WorkProfile:
      type: object
      properties:
        queueIds:
          type: array
          description: Список идентификаторов очередей.
          example:
          - 55da9b66-c928-4d47-9811-dbbab20d3780
          items:
            type: string
        callRule:
          type: string
          description: Правило вызова визитов.
          example: maxWaitingTime
      description: "Рабочий профиль оператора. Содержит список очередей, с которым\
        и работает профиль, и правило вызова визитов."
      example:
        id: d5a84e60-e605-4527-b065-f4bd7a385790
        name: Хирург
        queueIds:
        - 55da9b66-c928-4d47-9811-dbbab20d3780
        callRule: maxWaitingTime
      allOf:
      - $ref: "#/components/schemas/BranchEntity"
