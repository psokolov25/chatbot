          nullable: true
          example: 2024-01-01T10:15:00Z
        endDateTime:
          type: string
          description: Дата и время финального завершения.
          format: date-time
          nullable: true
          example: 2024-01-01T10:20:00Z
        servicePointId:
          type: string
          description: Идентификатор точки обслуживания.
          nullable: true
          example: a66ff6f4-4f4a-4009-8602-0dc278024cf2
        userName:
          type: string
          description: Логин сотрудника.
          nullable: true
          example: ivanov
        userId:
          type: string
          description: Идентификатор сотрудника.
          nullable: true
          example: b9f1d2c3-4e5f-6789-0123-456789abcdef
        poolUserId:
          type: string
          description: Идентификатор сотрудника в пуле.
          nullable: true
          example: 0b9c7b7a-6b5c-4a3f-9a1d-2e3f4a5b6c7d
        poolServicePointId:
          type: string
          description: Идентификатор точки обслуживания в пуле.
          nullable: true
          example: f2a1b3c4-d5e6-4f78-9a0b-1c2d3e4f5a6b
        unservedServices:
          type: array
          description: Список неоказанных услуг.
          items:
            $ref: "#/components/schemas/Service"
        servedServices:
          type: array
          description: Список оказанных услуг.
          items:
            $ref: "#/components/schemas/Service"
        visitMarks:
          type: array
          description: Список меток визита.
          items:
            $ref: "#/components/schemas/Mark"
        visitNotes:
          type: array
          description: Список заметок визита.
          items:
            $ref: "#/components/schemas/Mark"
        currentService:
          description: "Услуга, которая обслуживается в данный момент."
          allOf:
          - $ref: "#/components/schemas/Service"
        parameterMap:
          type: object
          additionalProperties:
            type: string
          description: Дополнительные параметры визита.
