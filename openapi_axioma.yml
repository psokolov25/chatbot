          4. Возвращает структуру AuthorizationResponse без дополнительных преобразований, чтобы клиент
             мог использовать токены в последующих вызовах API.

        Важно: контроллер проксирует ответ Keycloak. Если авторизация неуспешна, возвращается
        унифицированная ошибка HttpErrorHandler.ErrorResponse.
