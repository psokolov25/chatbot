          default: 37493d1c-8282-4417-a729-dceac1f3e2b4
        example: 37493d1c-8282-4417-a729-dceac1f3e2b4
      - name: restoreVisit
        in: query
        description: Восстановить привязку активных визитов к обновлённым точкам обслуживания.
