        printTicket:
          type: boolean
          description: Признак печати талона.
          example: true
        entryPoint:
          description: "Точка создания визита (например, терминал или ресепшен)."
          allOf:
          - $ref: "#/components/schemas/EntryPoint"
        queueId:
          type: string
          description: Идентификатор очереди.
          nullable: true
          example: 55da9b66-c928-4d47-9811-dbbab20d3780
        visitEvents:
          type: array
          description: Список событий визита.
          items:
            $ref: "#/components/schemas/VisitEvent"
        events:
          type: array
          description: Подробная история событий визита.
          items:
            $ref: "#/components/schemas/VisitEventInformation"
        returnTimeDelay:
          type: integer
