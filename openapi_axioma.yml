openapi: 3.0.1
info:
  title: VisitManager — управление визитами
  description: |
    Сервис Micronaut 4.9.3 на Java 17 автоматизирует регистрацию визитов, управление очередями, печать
    талонов и контроль занятости сотрудников в филиальной сети.

    REST API сгруппирован по контроллерам и бизнес-сценариям:

    - **ConfigurationController** — публикует конфигурацию отделений, услуг, точек обслуживания
      и очередей, а также позволяет синхронизировать изменения между клиентами.
    - **EntrypointController** — поддерживает сценарии ресепшена и терминалов самообслуживания
      при создании визитов, назначении параметров и печати талонов.
    - **ServicePointController** — обслуживает рабочие места операторов, позволяет вызывать и
      переводить визиты, завершать обслуживание, фиксировать причины и результаты операций.
    - **ManagementController / ManagementInformationController** — агрегируют мониторинг отделений,
      сотрудников и визитов для интерфейсов управления и внешних витрин.
    - **SystemConfigurationController** — управляет системными параметрами, перечитыванием,
      сохранением и откатом настроек.
    - **KeyCloakController** — предоставляет проксирующие операции авторизации и завершения
      сессий Keycloak.

    **Формат ответов и ошибки.** Успешные ответы возвращаются в JSON-моделях предметной области
    (Visit, Branch, Service и т. д.), а ошибки сериализуются в единый контракт
    HttpErrorHandler.ErrorResponse с traceId, кодом и локализованным описанием. Для конфликтов
    состояния используются HTTP 409, для отсутствующих сущностей — HTTP 404.

    **Версионирование и совместимость.** Для устаревших маршрутов сохраняется обратная
    совместимость через deprecated-эндпоинты с заголовками Deprecation/Sunset и ссылкой
    на актуальный путь.

    **Локализация.** Документация OpenAPI отображается на русском языке по умолчанию; переключение
    языков выполняет фильтр SwaggerLocaleFilter, учитывающий параметр lang и заголовок Accept-Language.

    **Обработка строк.** Входные текстовые параметры нормализуются утилитами VisitStringSanitizer и
    VisitStringCaseNormalizer вместе с VisitStringPredicates: пробелы по краям удаляются, пустые значения
    переводятся в значения по умолчанию через VisitStringDefaults. Это гарантирует корректную локализацию
    и отсутствие артефактов при сравнении идентификаторов.

    **Правила вызова.** CallRuleUtils нормализует идентификаторы очередей и рабочие профили, удаляя
    лишние пробелы утилитами VisitStringUtils и проверяя обязательные аргументы через VisitValidationUtils
    перед подбором визита. Это исключает ошибки локализации и обеспечивает предсказуемость сценариев
    maxWaitingTime/maxLifeTime даже при неидеальных пользовательских данных.

    **Лицензирование.** Простая (неисключительная) лицензия с оплатой по модели Named User (MAU); расчёт
    вознаграждения ведётся по активным пользователям, подробности в LICENSE-ru.md.
  license:
    name: "Простая (неисключительная) лицензия: Named User (MAU)"
    url: https://192.168.8.32/aritmosplatform/visitmanager/-/blob/dev/LICENSE-ru.md
  version: beta05.26
