      summary: Маршрутизация визита из точки обслуживания
      description: |
        Унифицированно возвращает или переводит визит из точки обслуживания в очередь или пул:
          1. Валидирует отделение и определяет тип назначения по идентификатору (очередь, пул сотрудника или пул точки).
          2. Для операции TRANSFER запускает перенос с учётом позиции: isAppend=true ставит в конец,
             isAppend=false — в начало, при передаче index применяется точная позиция (приоритетнее isAppend).
          3. Для операции RETURN выполняет возврат с заданной задержкой и актуализирует историю обслуживания.
          4. Возвращает визит с обновлёнными ссылками на выбранный поток обслуживания.
      operationId: routeVisitFromServicePoint
      parameters:
      - name: branchId
        in: path
        description: Идентификатор отделения.
        required: true
        schema:
          type: string
          default: 37493d1c-8282-4417-a729-dceac1f3e2b4
        example: 37493d1c-8282-4417-a729-dceac1f3e2b4
      - name: servicePointId
        in: path
        description: Идентификатор точки обслуживания.
        required: true
        schema:
          type: string
          default: a66ff6f4-4f4a-4009-8602-0dc278024cf2
        example: a66ff6f4-4f4a-4009-8602-0dc278024cf2
      - name: targetId
        in: query
        description: Идентификатор очереди или пула.
        required: true
        explode: false
        schema:
          type: string
        example: c211ae6b-de7b-4350-8a4c-cff7ff98104e
      - name: operation
        in: query
        description: "Тип маршрутизации: TRANSFER — перевод в целевую очередь/пул\
          , RETURN — возврат визита в пул ожидания."
        required: true
        explode: false
        schema:
          type: string
          default: TRANSFER
          enum:
          - TRANSFER
          - RETURN
        example: TRANSFER
      - name: isAppend
        in: query
        description: "Порядок вставки при операции TRANSFER: true — конец очереди\
          , false — начало. Для RETURN параметр игнорируется."
        required: true
        explode: false
        schema:
          type: boolean
          default: true
        example: true
      - name: operationTimeDelay
        in: query
        description: "Неотрицательная задержка доступности визита после маршрутиза\
          ции в секундах. Для TRANSFER используется как transferTimeDelay, для RETURN\
          \ — как returnTimeDelay."
        explode: false
        schema:
          type: integer
          format: int64
          nullable: true
        example: 60
