      - 2.01 · Конфигурация · Отделения
      summary: Обновление конфигурации отделений
      description: |
        Пошагово обновляет конфигурацию отделений на основе переданного набора данных:
          1. Проверяет корректность идентификаторов отделений и обязательных полей
             (название, точки обслуживания, очереди).
          2. Передаёт структуру в Configuration.createBranchConfiguration, где происходит слияние
             с текущим состоянием и синхронизация связанных сущностей.
          3. Обновляет BranchService и VisitService: пересоздаёт очереди, привязки к точкам и при
             необходимости переносит визиты в актуальные структуры.
          4. Возвращает обновлённую карту отделений для дальнейшего администрирования и
             мониторинга.
      operationId: updateBranchConfiguration
