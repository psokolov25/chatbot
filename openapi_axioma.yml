      summary: Закрытие точки обслуживания
      description: |-
        Завершает смену сотрудника и освобождает рабочее место:
          1. Проверяет наличие отделения и точки обслуживания, для которой инициировано закрытие.
          2. Определяет сценарий завершения (штатно, перерыв, принудительное закрытие) по переданным параметрам.
          3. Снимает закрепление сотрудника, переносит незавершённые визиты в очереди или пулы и фиксирует
             тайм‑ауты для повторного вызова клиентов.
          4. Публикует события SERVICE_POINT_CLOSING/SERVICE_POINT_CLOSED и очищает кэши авто‑вызова и мониторинга.
          5. Завершает обработку без тела ответа, чтобы клиент обновил состояние панели смены и журналов.


        ⚠️ Эндпоинт устарел. Используйте каноничный путь /servicepoint/branches/{branchId}/service-points/{servicePointId}/sessions/current.
