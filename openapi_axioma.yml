      summary: Открытие точки обслуживания
      description: |
        Открывает рабочее место сотрудника и подготавливает инфраструктуру смены:
          1. Проверяет существование отделения, выбранной точки обслуживания и рабочего профиля.
          2. Убеждается, что точка свободна, у сотрудника нет активных смен и нет зависших визитов.
          3. При isForced=true и занятой точке завершает смену текущего сотрудника, выполняет принудительный
             выход из Keycloak и, при необходимости, закрывает активный визит с фиксацией причины.
          4. Закрепляет сотрудника за точкой, назначает рабочий профиль, синхронизирует очереди и запускает
             таймеры авто‑вызова и контроля перерывов.
          5. Инициирует подгрузку активных визитов точки, публикует события SERVICE_POINT_OPENED/USER_LOGGED_IN
             для фронтов, очередей и статистики.
          6. Возвращает карточку пользователя с обновлённым контекстом смены для дальнейших операций.
