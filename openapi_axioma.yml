        callDateTime:
          type: string
          description: Дата и время вызова клиента.
          format: date-time
          nullable: true
          example: 2024-01-01T10:00:00Z
        startServingDateTime:
          type: string
          description: Дата и время начала обслуживания.
          format: date-time
