      summary: Вызов визита по правилу рабочего профиля
      description: |
        Автоматически подбирает визит согласно правилу вызова активного рабочего профиля:
          1. Загружает отделение и убеждается, что точка обслуживания присутствует в конфигурации и доступна.
          2. Проверяет, что сотрудник авторизован в точке, выбран рабочий профиль и он настроен для текущего филиала.
          3. Определяет правило вызова: использует стандартные сценарии maxWaitingTime/maxLifeTime, кастомное Groovy-правило
             либо передаёт подбор внешнему сервису правил вызова (call-rule), если он указан в конфигурации отделения.
          4. Применяет правило вызова, чтобы выбрать подходящий визит с учётом блокировок, занятости рабочих мест и приоритетов обслуживания.
          5. Если правило вызова у рабочего профиля отсутствует
             (или null, или пустая строка), визит выбирается с максимальным временем ожидания из первой
             (по порядку очередей в рабочем профиле) непустой очереди.
          6. При активном признаке подтверждения переводит визит в режим ожидания подтверждения, иначе проводит стандартный вызов и закрепляет талон за рабочим местом.
          7. При отсутствии подходящих визитов синхронизирует режим автовызова (autoCallMode) и фиксирует отсутствие кандидатов.
        Возвращает карточку вызванного визита, визита в ожидании подтверждения либо сообщает об отсутствии подходящих талонов.
