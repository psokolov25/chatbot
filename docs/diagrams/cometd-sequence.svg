<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1580" viewBox="0 0 1400 1580" role="img" aria-label="CometD lifecycle: подписка, long-polling, VISIT_CALL и восстановление">
  <defs>
