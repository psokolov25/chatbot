  <rect x="350" y="110" width="160" height="82" rx="18" fill="#F8FAFC" stroke="#64748B" stroke-width="1.6" filter="url(#cardShadow)"/>
  <text x="430.0" y="138" font-family="Arial, sans-serif" font-size="15" fill="#0F172A" font-weight="700" text-anchor="middle">
    <tspan x="430.0" dy="0">Watchdog</tspan>
  </text>
  <text x="430.0" y="168" font-family="Arial, sans-serif" font-size="12" fill="#475569" font-weight="400" text-anchor="middle">
    <tspan x="430.0" dy="0">cometd_watchdog</tspan>
  </text>
  <polyline points="430,192 430,1480" stroke="#334155" stroke-width="2.9" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="9 6"/>
  <rect x="620" y="110" width="160" height="82" rx="18" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6" filter="url(#cardShadow)"/>
